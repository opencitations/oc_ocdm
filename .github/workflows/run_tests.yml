name: Run tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  CheckCoverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6

    - name: Install UV
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --locked --all-groups

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Start test database
      run: |
        chmod +x ./tests/start-test-database.sh
        ./tests/start-test-database.sh

    - name: Run tests with coverage
      run: |
        uv run coverage run --rcfile=tests/coverage/.coveragerc
        echo "=== Coverage Report ==="
        uv run coverage report
        echo "COVERAGE=$(uv run coverage report | grep TOTAL | awk '{print $4}')" >> $GITHUB_ENV

    - name: Stop test database
      if: always()
      run: |
        chmod +x ./tests/stop-test-database.sh
        ./tests/stop-test-database.sh

    - name: Generate HTML coverage report (for master branch only)
      if: github.ref == 'refs/heads/master' && matrix.python-version == '3.10'
      run: |
        uv run coverage html -d htmlcov

    - name: Generate coverage badge
      if: matrix.python-version == '3.10'
      run: |
        COVERAGE_NUM=$(echo ${{ env.COVERAGE }} | sed 's/%//')

        if (( $(echo "$COVERAGE_NUM >= 90" | bc -l) )); then
          COLOR="green"
        elif (( $(echo "$COVERAGE_NUM >= 75" | bc -l) )); then
          COLOR="yellow"
        elif (( $(echo "$COVERAGE_NUM >= 60" | bc -l) )); then
          COLOR="orange"
        else
          COLOR="red"
        fi

        echo "BADGE_COLOR=$COLOR" >> $GITHUB_ENV

    - name: Create badge
      if: matrix.python-version == '3.10'
      uses: RubbaBoy/BYOB@v1.3.0
      with:
        name: opencitations-oc_ocdm-coverage-${{ github.ref_name }}
        label: "Coverage"
        status: "${{ env.COVERAGE }}"
        color: ${{ env.BADGE_COLOR }}
        github_token: ${{ secrets.GIST_PAT }}
        repository: arcangelo7/badges
        actor: arcangelo7

    - name: Upload coverage report to GitHub Pages artifact (for master branch only)
      if: github.ref == 'refs/heads/master' && matrix.python-version == '3.10'
      uses: actions/upload-pages-artifact@v4
      with:
        path: htmlcov/

    - uses: actions/upload-artifact@v7
      with:
          name: coverage-artifact-${{ matrix.python-version }}
          path: tests/coverage/

  DeployPages:
    needs: CheckCoverage
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
